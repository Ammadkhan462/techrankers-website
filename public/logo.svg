<svg width="200" height="80" viewBox="0 0 400 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TR with upward arrow -->
  <g>
    <!-- T -->
    <rect x="40" y="30" width="50" height="15" fill="url(#gradientTR)" rx="3"/>
    <rect x="58" y="30" width="14" height="80" fill="url(#gradientTR)" rx="2"/>
    
    <!-- R -->
    <path d="M 110 30 L 110 110 M 110 30 L 150 30 Q 165 30 165 45 Q 165 60 150 60 L 110 60 M 145 60 L 170 110" 
          stroke="url(#gradientTR)" strokeWidth="14" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    
    <!-- Upward Arrow -->
    <path d="M 90 100 L 90 40 M 90 40 L 75 55 M 90 40 L 105 55" 
          stroke="url(#gradientArrow)" strokeWidth="12" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
  </g>
  
  <!-- Text: TechRankers.net -->
  <text x="200" y="90" fontFamily="Arial, sans-serif" fontSize="48" fontWeight="bold" fill="#001a4d">
    TechRankers
    <tspan fontSize="40" fill="#0066cc">.net</tspan>
  </text>
  
  <defs>
    <linearGradient id="gradientTR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientArrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
